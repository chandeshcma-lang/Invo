<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice PDF to Excel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f8fc;
      margin: 0;
      padding: 24px;
      color: #1f2937;
    }

    .card {
      max-width: 620px;
      margin: 40px auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1.6rem;
    }

    p {
      margin-top: 0;
      color: #4b5563;
    }

    .error {
      margin-top: 12px;
      background: #fee2e2;
      color: #991b1b;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      margin-top: 16px;
      background: #2563eb;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Invoice PDF → Excel</h1>
    <p>Upload your invoice PDF and download an Excel file with extracted table data.</p>

    <form action="/convert" method="post" enctype="multipart/form-data">
      <input type="file" name="pdf_file" accept="application/pdf" required />
      <br />
      <button type="submit">Convert to Excel</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </main>
</body>
</html>
